syntax = "proto3";

package api;

message IdName
{
  uint64 id = 1;
  string name = 2;
}

message State
{
  uint64 kind_id = 1;
  uint64 host_id = 2;
  uint32 dns_type = 3;
  uint32 err = 4;
  uint64 ts = 5;
}

message Check
{
  uint64 last = 1;
  uint64 count = 2;
  uint64 cost = 3;
}

message StateLi
{
  repeated IdName kind = 1;
  repeated IdName host = 2;
  repeated State li = 3;
  Check check = 4;
}
