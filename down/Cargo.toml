[package]
name = "down"
version = "0.1.1"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/down"
description = "down"
keywords = [ ]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [ "--cfg", "docsrs" ]

[features]
default = [ ]

[dependencies]
aok = "0.1.17"
indexmap = "2.9.0"
kanal = "0.1.1"
len-trait = "0.6.1"
roaring = "0.10.12"
tracing = "0.1.41"

[dependencies.ireq]
version = "0.1.31"
path = "../ireq"
features = [ "proxy" ]

[dependencies.tokio]
version = "1.45.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.4"
