[package]
name = "xrpc"
version = "0.1.18"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/xrpc"
description = "English: RPC adapter for unified request handling / 中文: 统一请求处理的RPC适配器"
keywords = ["rpc", "adapter", "http", "grpc", "rust"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
volo-grpc = ["dep:volo-grpc", "volo"]
volo-http = ["dep:volo-http", "volo"]
volo = []

[dev-dependencies]
log = "0.4.28"
static_init = "1.0.4"

[dev-dependencies.log_init]
path = "../log_init"
version = "0.1.27"

[dependencies]
anyhow = "1.0.100"
bytes = "1.10.1"
coarsetime = "0.1.36"
faststr = "0.2.32"
http = "1.3.1"
log = { version = "0.4.28" }
volo-grpc = { version = "0.11.7", optional = true }
volo-http = { version = "0.4.3", optional = true }