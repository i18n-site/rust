[dependencies]
aok = "0.1.18"
futures = "0.3.32"
reqwest = "0.13.3"
serde = "1.0.228"
sonic-rs = "0.5.8"
tracing = "0.1.44"

[dependencies.tokio]
version = "1.52.1"
features = [ "time", "macros" ]

[dependencies.ireq]
version = "0.1.34"


[package]
name = "ghapi"
version = "0.1.10"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/ghapi"
description = "ghapi"

[package.metadata.docs.rs]
all-features = true

[dev-dependencies]
aok = "0.1.18"
loginit = "0.1.18"
static_init = "1.0.4"
tracing = "0.1.44"

[dev-dependencies.tokio]
version = "1.52.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
