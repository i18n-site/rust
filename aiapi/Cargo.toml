[package]
name = "aiapi"
version = "0.1.41"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/aiapi"
description = "aiapi"

[package.metadata.docs.rs]
all-features = true

[package.metadata.cargo-machete]
ignored = [ "static_init", "prost" ]

[dependencies]
aok = "0.1.17"
dashmap = "6.1.0"
ireq = "0.1.31"
prost = "0.14.1"
reqwest = "0.12.22"
serde_yaml = "0.9.34"
sonic-rs = "0.5.3"
strum_macros = "0.27.2"
thiserror = "2.0.12"
tracing = "0.1.41"

[dependencies.confdir]
version = "0.1.4"
path = "../confdir"

[dependencies.sts]
version = "0.1.23"
path = "../sts"

[dependencies.tokio]
version = "1.46.1"
features = [ "rt-multi-thread", "macros", "sync" ]

[dependencies.ifs]
version = "0.1.46"
path = "../ifs"
default-features = false
features = [ "conf" ]

[dependencies.pos_next]
version = "0.1.6"
path = "../pos_next"

[dependencies.serde]
version = "1.0.219"
features = [ "derive" ]

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.4"
tracing = "0.1.41"

[dev-dependencies.genv]
path = "../genv"
version = "0.1.16"

[dev-dependencies.tokio]
version = "1.46.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]

[build-dependencies]
aok = "0.1.17"
prost-build = "0.14.1"
