[package]
name = "xkv_demo"
version = "0.1.0"
edition = "2024"

[package.metadata.cargo-machete]
ignored = [ "linkme" ]

[dependencies]
linkme = "0.3.33"
log = "0.4"

[dependencies.static_]
version = "0.1.14"
path = "../../static_"

[dependencies.tokio]
version = "1.47.1"
features = [ "macros", "rt", "rt-multi-thread", "time" ]

[dependencies.xkv]
version = "0.1.46"
path = ".."
features = [ "r" ]

[dependencies.aok]
version = "0.1.17"
path = "../../aok"
