[package]
name = "xkv"
version = "0.1.38"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/xkv"
description = "use fred connection redis via env"

[features]
r = ["macro"]
macro = [
  "dep:async-lazy",
  "dep:xboot",
  "dep:linkme",
  "dep:tokio",
  "dep:tracing",
]

[dependencies]
aok = "0.1.15"
tracing = { version = "0.1.41", optional = true }

[dependencies.linkme]
version = "0.3.31"
optional = true

[dependencies.tokio]
version = "1.42.0"
features = ["rt"]
optional = true

[dependencies.xboot]
version = "0.1.11"
path = "../xboot"
optional = true

[dependencies.async-lazy]
version = "0.1.0"
features = ["parking_lot", "nightly"]
optional = true

[dependencies.fred]
version = "10.0.3"
features = [
  "replicas",
  "rustls",
  "sha-1",
  "sentinel-auth",
  "unix-sockets",
  "i-scripts",
]

[dev-dependencies.tokio]
version = "1.42.0"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
