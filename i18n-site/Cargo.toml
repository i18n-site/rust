[package]
name = "i18n-site"
version = "0.2.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/i18n_site"
description = "i18n_site"

[dependencies]
prost = "0.12.3"
serde_yaml = "0.9.34"
thiserror = "1.0.58"
walkdir = "2.5.0"
xerr = { version = "0.1.11", path = "../xerr" }

[dependencies.i18]
version = "0.1.189"
path = "../i18"

[dependencies.ifs]
version = "0.1.25"
path = "../ifs"
default-features = false
features = ["fs", "is_hidden"]

[dependencies.lang]
version = "0.1.14"
path = "../lang"

[dependencies.serde]
version = "1.0.197"
features = ["derive"]

[dependencies.clap]
version = "4.5.4"
features = ["cargo"]

[dependencies.cmdv]
version = "0.1.6"
path = "../cmdv"

[dependencies.i18n_bgu]
version = "0.1.2"
path = "../i18n_bgu"

[dependencies.tokio]
version = "1.36.0"
features = ["macros", "rt", "rt-multi-thread", "time", "fs", "io-util"]

[dependencies.aok]
version = "0.1.3"
path = "../aok"

[build-dependencies]
prost-build = "0.12.3"

[build-dependencies.aok]
version = "0.1.3"
path = "../aok"
