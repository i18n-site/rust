syntax = "proto3";

package api;

message Nav
{
  string code = 1;
  string url = 2;
}

message Render
{
  string func = 1;
  repeated string url_li = 2;
}

message Lang
{
  string name = 1;
  string en = 2;
  string url = 3;
}

message Ver
{
  string url = 1;
  string name = 2;
}

message VerLi
{
  repeated Ver li = 1;
}

message Site
{
  string ver = 1;
  string ver_li_url = 2;
  string host = 3;
  repeated Render render_li = 4;
  repeated Nav nav_li = 5;
  repeated Lang lang_li = 6;
  repeated string url_li = 7;
}

message SiteLang
{
  repeated string nav_i18n_li = 1;
  repeated string url_v_li = 2;
}
