[package]
name = "proxyfree"
version = "0.1.0"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/proxyfree"
description = "proxyfree"
keywords = [ ]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [ "--cfg", "docsrs" ]

[features]
default = [ ]

[dev-dependencies]
anyhow = "1.0.102"
aok = "0.1.18"
log = "0.4.29"
static_init = "1.0.4"

[dev-dependencies.log_init]

version = "0.1.34"

[dev-dependencies.tokio]
version = "1.52.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]

[dependencies]
crossbeam-skiplist = "0.1.3"
futures = "0.3.32"
log = "0.4.29"
thiserror = "2.0.18"

[dependencies.reqwest]
version = "0.13.3"
features = [ "json", "rustls", "socks" ]

[dependencies.tokio]
version = "1.52.1"
features = [ "full", "net", "rt" ]
