[package]
name = "zset"
version = "0.1.1"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/zset"
description = "A thread-safe, Redis-like sorted set implementation in Rust. / 一个线程安全的、类似 Redis 的 Rust 排序集实现。"
keywords = ["sorted-set", "zset", "redis", "concurrent", "data-structure"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["impl"]
impl = []

[dependencies]
dashmap = "6.1.0"
parking_lot = "0.12.4"
sorted-vec = "0.8.10"

[dev-dependencies]
anyhow = "1.0.100"
log = "0.4.28"
ordered-float = "5.0.0"
static_init = "1.0.4"
rand = "0.9.2"

[dev-dependencies.log_init]
path = "../log_init"
version = "0.1.25"