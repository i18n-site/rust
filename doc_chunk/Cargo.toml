[package]
name = "doc_chunk"
version = "0.1.3"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/doc_chunk"
description = "doc_chunk"
keywords = []

[features]
default = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
aok = "0.1.18"
unicode-segmentation = "1.13.2"

[dev-dependencies]
aok = "0.1.18"
loginit = "0.1.18"
static_init = "1.0.4"
tracing = "0.1.44"

[dev-dependencies.tokio]
version = "1.52.1"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
