[package]
name = "hi"
version = "0.1.8"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/3TiSite/rust.git"
homepage = "https://github.com/3TiSite/rust/tree/main/hi"
description = "hi with mail & wxpusher"

[dependencies]
aok = { version = "0.1.2", path = "../aok" }
genv = { version = "0.1.5", path = "../genv" }
ireq = { version = "0.1.2", path = "../ireq" }
reqwest = { version = "0.11.23", features = ["http3"] }
sonic-rs = "0.3.1"
static_init = "1.0.3"
tokio = { version = "1.35.1", features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "time",
  "sync",
] }
tracing = "0.1.40"
wxpush = { version = "0.1.9", path = "../wxpush" }
xerr = { version = "0.1.1", path = "../xerr" }
xsmtp = { version = "0.1.3", path = "../xsmtp" }

[dev-dependencies]

[features]