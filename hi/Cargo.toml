[package]
name = "hi"
version = "0.1.12"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/3TiSite/rust.git"
homepage = "https://github.com/3TiSite/rust/tree/main/hi"
description = "hi with mail & wxpusher"

[dependencies]
aok = { version = "0.1.2" }
genv = { version = "0.1.6" }
ireq = { version = "0.1.7" }
reqwest = { version = "0.11.23", features = ["http3"] }
sonic-rs = "0.3.1"
static_init = "1.0.3"
tokio = { version = "1.35.1", features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "time",
  "sync",
] }
tracing = "0.1.40"
wxpush = { version = "0.1.11" }
xerr = { version = "0.1.2" }
xsmtp = { version = "0.1.8" }
xstr = { version = "0.1.9" }

[dev-dependencies]

[features]
