[package]
name = "hi"
version = "0.1.15"
edition = "2021"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/hi"
description = "hi with mail & wxpusher"

[package.metadata.cargo-machete]
ignored = ["static_init"]

[dependencies]
genv = { version = "0.1.16", path = "../genv" }
sonic-rs = "0.3.17"
static_init = "1.0.3"

[dependencies.xsmtp]
version = "0.1.18"
path = "../xsmtp"

[dependencies.aok]
version = "0.1.17"

[dependencies.ireq]
version = "0.1.17"

[dependencies.tokio]
version = "1.43.0"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]

[dependencies.wxpush]
version = "0.1.16"

[dependencies.xerr]
version = "0.1.15"

[dependencies.xstr]
version = "0.1.11"
