[package]
name = "idns"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/3TiSite/rust.git"
homepage = "https://github.com/3TiSite/rust/tree/main/idns"
description = "idns"

[dependencies]
hickory-resolver = { version = "0.24.0", features = ["tokio", "dns-over-tls", "tokio-rustls", "dns-over-rustls"] }
static_init = "1.0.3"
tokio = { version = "1.35.1", features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "time",
  "sync",
] }

[dev-dependencies]

[features]
