[package]
name = "aliver"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/3TiSite/rust.git"
homepage = "https://github.com/3TiSite/rust/tree/main/aliver"
description = "aliver"

[dependencies]
aerr = { version = "0.1.11" }
alive = "0.1.6"
aok = { version = "0.1.2" }
axum = "0.7.3"
genv = { version = "0.1.5" }
ireq = { version = "0.1.7", path = "../ireq" }
loginit = { version = "0.1.4" }
sonic-rs = "0.3.1"
static_init = "1.0.3"
tokio = { version = "1.35.1", features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "time",
  "sync",
] }
tower = "0.4.13"
tower-http = { version = "0.5.0", features = ["compression-full", "decompression-full"] }
tracing = "0.1.40"
xerr = { version = "0.1.2", path = "../xerr" }

[dev-dependencies]

[features]
