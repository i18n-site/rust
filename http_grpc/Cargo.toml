[package]
description = "http_grpc"
edition = "2024"
homepage = "https://github.com/i18n-site/rust/tree/dev/http_grpc"
keywords = [ ]
license = "MulanPSL-2.0"
name = "http_grpc"
repository = "https://github.com/i18n-site/rust.git"
version = "0.1.5"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [ "--cfg", "docsrs" ]

[build-dependencies]
anyhow = "1.0.100"
pilota-build = "0.12.15"

[dependencies]
anyhow = "1.0.100"
bytes = "1.10.1"
pilota = "0.12.3"

[dependencies.xrpc]
version = "0.1.17"
path = "../xrpc"

[dev-dependencies]
log = "0.4.28"
static_init = "1.0.4"

[dev-dependencies.log_init]
path = "../log_init"
version = "0.1.27"

[features]
default = [ ]
