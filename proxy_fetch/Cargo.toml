[package]
name = "proxy_fetch"
version = "0.1.0"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/proxy_fetch"
description = "proxy_fetch"
keywords = [ ]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [ "--cfg", "docsrs" ]

[features]
default = [ ]

[dependencies]
base64 = "0.22.1"
futures = "0.3.31"
reqwest-middleware = "0.4.2"
thiserror = "2.0.16"
url = "2.5.7"
zset = { version = "0.1.3", path = "../zset" }

[dependencies.reqwest]
version = "0.12.23"
features = [ "zstd", "brotli" ]

[dependencies.reqwest_ss_proxy]
version = "0.1.10"
path = "../reqwest_ss_proxy"

[dependencies.tokio]
version = "1.47.1"
features = [ "full" ]

[dependencies.xerr]
version = "0.1.16"
path = "../xerr"

[dev-dependencies]
aok = "0.1.17"
log = "0.4.28"
static_init = "1.0.4"

[dev-dependencies.genv]
path = "../genv"
version = "0.1.16"

[dev-dependencies.log_init]
path = "../log_init"
version = "0.1.25"

[dev-dependencies.tokio]
version = "1.47.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
