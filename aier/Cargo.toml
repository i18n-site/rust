[package]
name = "aier"
version = "0.1.0"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/aier"
description = "aier"
keywords = []

[features]
default = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
aok = "0.1.17"
ireq = { version = "0.1.31", path = "../ireq" }
mreplace = { version = "0.1.7", path = "../mreplace" }
rand = "0.9.1"
serde = "1.0.219"
sonic-rs = "0.5.2"

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.4"
tracing = "0.1.41"

[dev-dependencies.tokio]
version = "1.46.0"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
