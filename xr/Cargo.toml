[package]
name = "xr"
version = "0.1.8"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/xr"
description = "xr"

[package.metadata.docs.rs]
all-features = true

[package.metadata.cargo-machete]
ignored = [ "ctor" ]

[features]
default = [ ]

[dependencies]
aok = "0.1.15"
async-lazy = "0.1.0"
ctor = "0.2.9"
linkme = "0.3.31"

[dependencies.xboot]
version = "0.1.9"
path = "../xboot"

[dependencies.xkv]
version = "0.1.37"
path = "../xkv"

[dev-dependencies]
aok = "0.1.15"
loginit = "0.1.13"
static_init = "1.0.3"
tracing = "0.1.41"

[dev-dependencies.tokio]
version = "1.42.0"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
