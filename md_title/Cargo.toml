[package]
name = "md_title"
version = "0.1.12"
edition = "2021"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/md_title"
description = "md_title"

[features]
default = []

[package.metadata.docs.rs]
all-features = true

[dependencies]
aok = "0.1.17"
html2text = "0.14.2"
htmlize = "1.0.5"
xerr = { version = "0.1.15", path = "../xerr" }

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.3"
tracing = "0.1.41"

[dev-dependencies.tokio]
version = "1.44.1"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
