[dependencies]
aok = "0.1.18"
bytes = "1.11.1"
reqwest = "0.13.3"
static_init = "1.0.4"
thiserror = "2.0.18"
tracing = "0.1.44"

[dependencies.genv]
version = "0.1.17"
path = "../genv"

[dependencies.header_map]
version = "0.1.5"
path = "../header_map"

[dependencies.citer]
version = "0.1.16"


[dependencies.ireq]
version = "0.1.34"
features = [ "proxy" ]

[dependencies.xerr]
version = "0.1.16"
path = "../xerr"

[package]
name = "mreq"
version = "0.1.17"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/mreq"
description = "mreq"

[package.metadata.docs.rs]
all-features = true

[dev-dependencies]
aok = "0.1.18"
loginit = "0.1.18"
static_init = "1.0.4"
tracing = "0.1.44"

[dev-dependencies.tokio]
version = "1.52.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
