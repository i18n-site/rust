[package]
name = "uper"
version = "0.1.0"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/uper"
description = "uper"
keywords = [ ]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [ "--cfg", "docsrs" ]

[features]
default = [ ]
conf = [ "dep:confer", "dep:confdir" ]

[dependencies]
aok = "0.1.17"
coarsetime = "0.1.36"
const-str = "0.6.2"
current_platform = "0.2.0"
kanal = "0.1.1"
tracing = "0.1.41"

[dependencies.down]
version = "0.1.2"
path = "../down"

[dependencies.ireq]
version = "0.1.31"
path = "../ireq"
features = [ "proxy" ]

[dependencies.idoh]
version = "0.1.3"
path = "../idoh"

[dependencies.riter]
version = "0.1.1"
path = "../riter"

[dependencies.ver_from_txt]
version = "0.1.9"
path = "../ver_from_txt"

[dependencies.xerr]
version = "0.1.15"
path = "../xerr"

[dependencies.confer]
version = "0.1.4"
path = "../confer"
features = [ "fs" ]
optional = true

[dependencies.confdir]
version = "0.1.2"
path = "../confdir"
optional = true

[dependencies.tokio]
version = "1.45.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.4"

[dev-dependencies.upgrade_host]
path = "../upgrade_host"
version = "0.1.1"
