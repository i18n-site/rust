[package]
name = "reqwest_client"
version = "0.1.4"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/reqwest_client"
description = "reqwest_client"
keywords = []

[features]
default = []
client = ["dep:static_init"]
proxy = []
proxy_from_env = ["proxy", "dep:genv", "dep:static_init"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
aok = "0.1.17"
genv = { version = "0.1.16", path = "../genv", optional = true }
reqwest = { version = "0.12.23", features = ["zstd", "gzip", "brotli"] }
static_init = { version = "1.0.4", optional = true }

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.4"
tracing = "0.1.41"

[dev-dependencies.tokio]
version = "1.47.1"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]