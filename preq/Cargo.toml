[package]
name = "preq"
version = "0.1.16"
edition = "2021"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/preq"
description = "ipv6 proxyed reqwest"

[dependencies]
bytes = "1.10.1"
tracing = "0.1.41"

[dependencies.genv]
version = "0.1.16"
path = "../genv"

[dependencies.preq1]
version = "0.1.12"
path = "../preq1"

[dependencies.reqwest]
version = "0.12.12"
features = [ "zstd" ]

[dependencies.static_init]
version = "1.0.3"

[dev-dependencies]
tracing = "0.1.41"

[dev-dependencies.aok]
path = "../aok"
version = "0.1.17"

[dev-dependencies.loginit]
path = "../loginit"
version = "0.1.18"

[dev-dependencies.tokio]
version = "1.43.0"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
