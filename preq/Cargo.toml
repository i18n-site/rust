[package]
name = "preq"
version = "0.1.20"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/preq"
description = "ipv6 proxyed reqwest"

[dependencies]
bytes = "1.11.0"

[dependencies.reqwest_client]
version = "0.1.14"
features = [ "proxy_from_env" ]

[dependencies.preq1]
version = "0.1.15"

[dependencies.reqwest]
version = "0.12.25"
features = [ "zstd", "rustls-tls" ]
default-features = false

[dev-dependencies]
log = "0.4.29"

[dev-dependencies.log_init]
path = "../log_init"
version = "0.1.30"

[dev-dependencies.aok]
version = "0.1.18"

[dev-dependencies.tokio]
version = "1.48.0"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
