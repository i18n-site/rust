[package]
name = "preq"
version = "0.1.3"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/3TiSite/rust.git"
homepage = "https://github.com/3TiSite/rust/tree/main/preq"
description = "ipv6 proxyed reqwest"

[dependencies]
form_urlencoded = "1.2.1"
genv = { version = "0.1.5", path = "../genv" }
reqwest = { version = "0.11.23", features = ["brotli"] }
static_init = "1.0.3"
tracing = "0.1.40"
xerr = { version = "0.1.9" }

[dev-dependencies]
aok = { path = "../aok" }
tokio = { version = "1.35.1", features = ["macros", "rt", "rt-multi-thread", "time", "sync"] }

[features]
