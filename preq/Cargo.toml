[package]
name = "preq"
version = "0.1.20"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/preq"
description = "ipv6 proxyed reqwest"

[dependencies]
bytes = "1.11.1"

[dependencies.reqwest_client]
version = "0.1.14"
path = "../reqwest_client"
features = [ "proxy_from_env" ]

[dependencies.preq1]
version = "0.1.15"
path = "../preq1"

[dependencies.reqwest]
version = "0.13.3"
features = [ "zstd", "rustls", "form" ]
default-features = false

[dev-dependencies]
log = "0.4.29"

[dev-dependencies.log_init]

version = "0.1.34"

[dev-dependencies.aok]
version = "0.1.18"

[dev-dependencies.tokio]
version = "1.52.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
