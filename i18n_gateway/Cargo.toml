[package]
name = "i18n_gateway"
version = "0.1.0"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/i18n_gateway"
description = "proxy"
keywords = []

[features]
default = []
tracing = []

[dependencies]
bytes = "1.10.1"
dashmap = "6.1.0"
faststr = "0.2.31"
http = "1.3.1"
parking_lot = "0.12.4"
pingora = { version = "0.6.0", features = ["rustls"] }
rustls-pemfile = "2.2.0"
thiserror = "2.0.16"
tracing = "0.1.41"
x509-parser = "0.17.0"

[dependencies.chrono]
version = "0.4.41"
features = ["serde"]

[dependencies.tokio]
version = "1.47.1"
features = [
  "fs",
  "io-util",
  "macros",
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
]

[dev-dependencies]
static_init = "1.0.4"
url = "2.5.6"
anyhow = "1.0.99"
env_logger = "0.11.8"
faststr = "0.2.31"
tracing = "0.1.41"
parking_lot = "0.12.4"
const-str = "0.6.4"

[dev-dependencies.aok]
path = "../aok"
version = "0.1.17"

[dev-dependencies.loginit]
path = "../loginit"
version = "0.1.18"

[[example]]
name = "cert_loader_test"
path = "examples/cert_loader_test.rs"
