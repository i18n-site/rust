[workspace]
members = [
  "xstr",
  "xerr",
  "t3",
  "tp",
  "xhash",
  "trt",
  "sts",
  "xmail",
  "svg2webp",
  "cookiestr",
  "loginit",
  "mysql_macro",
  "click_captcha",
  "xtld",
  "mreplace",
  "radix_str",
  "re",
  "wxpush",
  "genv",
  "xsmtp",
  "jarg",
  "set_header",
  "amid",
  "apart",
  "preq",
  "getc",
  "i18",
  "rany",
  "alive",
  "aok",
  "hi",
  "ireq",
  "i18n-site",
  "aliver",
  "aliver/alive",
  "idns",
]
resolver = "2"

[profile.release]
lto = true
opt-level = 3
incremental = true
codegen-units = 1
overflow-checks = false
panic = 'abort'
debug-assertions = false
strip = true

[profile.dev]
split-debuginfo = "unpacked"
