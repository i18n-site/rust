[package]
name = "upn"
version = "0.1.9"
edition = "2021"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/upn"
description = "unicode punctuation / 全角标点"

[package.metadata.docs.rs]
all-features = true

[features]
default = [ ]

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.3"
tracing = "0.1.41"

[dev-dependencies.tokio]
version = "1.44.1"
features = [ "macros", "rt", "rt-multi-thread", "time", "sync" ]
