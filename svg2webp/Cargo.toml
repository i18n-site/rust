[package]
name = "svg2webp"
version = "0.1.13"
edition = "2021"
repository = "https://github.com/i18n-site/rust/tree/main/svg2webp"
license = "MIT"
description = "convert svg to webp"

[dependencies]
image-webp = "0.2.1"
resvg = "0.44.0"
thiserror = "2.0.11"
tiny-skia = "0.11.4"
usvg = "0.44.0"

[dev-dependencies]
static_init = "1.0.3"

[dev-dependencies.aok]
path = "../aok"
version = "0.1.17"

[dev-dependencies.ifs]
path = "../ifs"
features = [ "fs" ]
version = "0.1.44"

[dev-dependencies.loginit]
path = "../loginit"
version = "0.1.18"
