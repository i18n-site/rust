[package]
name = "svg2webp"
version = "0.1.16"
edition = "2024"
repository = "https://github.com/i18n-site/rust/tree/main/svg2webp"
license = "MIT"
description = "convert svg to webp"

[dependencies]
resvg = "0.47.0"
thiserror = "2.0.18"
tiny-skia = "0.12.0"
usvg = "0.47.0"
zenwebp = "0.4.4"
[dev-dependencies]
static_init = "1.0.4"

[dev-dependencies.aok]
path = "../aok"
version = "0.1.18"

[dev-dependencies.ifs]
path = "../ifs"
features = [ "fs" ]
version = "0.1.47"

[dev-dependencies.loginit]
path = "../loginit"
version = "0.1.18"