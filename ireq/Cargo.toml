[package]
name = "ireq"
version = "0.1.7"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/3TiSite/rust.git"
homepage = "https://github.com/3TiSite/rust/tree/main/ireq"
description = "ireq"

[dependencies]
aok = { version = "0.1.2", path = "../aok" }
