[package]
name = "log_init"
version = "0.1.18"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/log_init"
description = "log_init"
keywords = []

[features]
default = ["stdout"]
stdout = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
anyhow = "1.0.99"
coarsetime = "0.1.36"
colored = "3.0.0"
dirs = "6.0.0"
jiff = "0.2.15"
log = "0.4.27"
logforth = "0.27.0"
static_init = "1.0.4"
workspace_root = "0.2.0"

[dev-dependencies]
aok = "0.1.17"
loginit = "0.1.18"
static_init = "1.0.4"
tracing = "0.1.41"

[dev-dependencies.tokio]
version = "1.47.1"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]