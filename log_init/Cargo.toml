[package]
name = "log_init"
version = "0.1.30"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/dev/log_init"
description = "log_init"
keywords = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["stdout"]
stdout = []
systemd = ["dep:logforth-append-journald"]

[dependencies]
coarsetime = "0.1.36"
colored = "3.0.0"
jiff = "0.2.16"
static_init = "1.0.4"

[dependencies.log]
version = "0.4.29"
features = ["kv"]

[dependencies.logforth]
version = "0.29.1"
features = ["starter-log"]

[dependencies.logforth-core]
version = "0.3.1"

[dependencies.logforth-append-journald]
version = "0.3.0"
optional = true

[dev-dependencies.aok]
path = "../aok"
version = "0.1.18"
