[package]
name = "wxpush"
version = "0.1.16"
edition = "2021"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/wxpush"
description = "api for https://wxpusher.zjiecode.com"

[dependencies]
anyhow = "1.0.98"
serde_with = "3.14.0"
sonic-rs = "0.5.2"
thiserror = "2.0.12"

[dependencies.reqwest]
version = "0.12.22"
features = ["json"]

[dependencies.serde]
version = "1.0.219"
features = ["derive"]

[dependencies.xstr]
version = "0.1.11"
path = "../xstr"

[dev-dependencies]
anyhow = "1.0.98"

[dev-dependencies.tokio]
version = "1.46.0"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
