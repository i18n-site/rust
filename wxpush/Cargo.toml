[package]
name = "wxpush"
version = "0.1.16"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/wxpush"
description = "api for https://wxpusher.zjiecode.com"

[dependencies]
anyhow = "1.0.100"
serde_with = "3.14.1"
sonic-rs = "0.5.4"
thiserror = "2.0.16"

[dependencies.reqwest]
version = "0.12.23"
features = ["json"]

[dependencies.serde]
version = "1.0.225"
features = ["derive"]

[dependencies.xstr]
version = "0.1.11"
path = "../xstr"

[dev-dependencies]
anyhow = "1.0.100"

[dev-dependencies.tokio]
version = "1.47.1"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
