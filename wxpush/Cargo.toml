[package]
name = "wxpush"
version = "0.1.16"
edition = "2021"
license = "MulanPSL-2.0"
repository = "https://github.com/i18n-site/rust.git"
homepage = "https://github.com/i18n-site/rust/tree/main/wxpush"
description = "api for https://wxpusher.zjiecode.com"

[dependencies]
anyhow = "1.0.96"
serde_with = "3.12.0"
sonic-rs = "0.3.17"
static_init = "1.0.3"
thiserror = "2.0.11"

[dependencies.reqwest]
version = "0.12.12"
features = ["json"]

[dependencies.serde]
version = "1.0.217"
features = ["derive"]

[dependencies.xstr]
version = "0.1.11"
path = "../xstr"

[dev-dependencies]
anyhow = "1.0.96"

[dev-dependencies.tokio]
version = "1.43.0"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
